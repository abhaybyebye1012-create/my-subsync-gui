name: Final Standalone AppImage Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y patchelf wget curl unzip xdg-utils gcc g++

    - name: Download Core Linuxdeploy Tool
      run: |
        cd ${{ github.workspace }}
        wget -O linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

    - name: Install Embedded Runtime (Miniconda)
      run: |
        cd ${{ github.workspace }}
        mkdir -p AppDir
        
        # Download and install Miniconda silently into AppDir
        wget -qO miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
        bash miniconda.sh -b -u -p "${{ github.workspace }}/AppDir/miniconda3"
        rm miniconda.sh

    - name: Create Isolated Environment & Install Dependencies
      run: |
        CONDA_INSTALL="${{ github.workspace }}/AppDir/miniconda3"
        ENV_PREFIX="${{ github.workspace }}/AppDir/envs/myenv"
        
        # Create a specific environment
        $CONDA_INSTALL/bin/conda create -y -n myenv python=3.10 --prefix "$ENV_PREFIX"
        
        # Install dependencies into that specific environment
        $CONDA_INSTALL/envs/myenv/bin/pip install "numpy<2.0" torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        $CONDA_INSTALL/envs/myenv/bin/pip install ffsubsync requests pysubs2 tqdm

    - name: Download & Bundle Static FFmpeg
      run: |
        cd ${{ github.workspace }}/AppDir
        mkdir -p usr/bin
        mkdir -p ext
        
        # Download archive
        wget -qO archive.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        
        # Extract safely
        tar xf archive.tar.xz -C ext --strip-components=1
        
        # Move binary to the correct place
        if [ -f ext/ffmpeg ]; then mv ext/ffmpeg usr/bin/ffmpeg; fi
        if [ ! -f usr/bin/ffmpeg ] && [ -f ext/bin/ffmpeg ]; then mv ext/bin/ffmpeg usr/bin/ffmpeg; fi
        
        # Remove temp files
        rm -rf ext archive.tar.xz
        chmod +x usr/bin/ffmpeg

    - name: Prepare Desktop Files
      run: |
        cd ${{ github.workspace }}/AppDir
        mkdir -p usr/share/applications usr/share/icons/hicolor/128x128/apps
        
        printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=FFSubsync GUI\nExec=AppRun\nIcon=subsync\nTerminal=false\nCategories=AudioVideo;Utility;\n' > usr/share/applications/SubSyncGui.desktop
        wget -q -O usr/share/icons/hicolor/128x128/apps/subsync.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || true

    - name: Configure Launchers (AppRun)
      run: |
        cd ${{ github.workspace }}/AppDir
        
        # Copy main script
        cp ${{ github.workspace }}/main.py .
        
        # Create the executable launcher
        cat > AppRun << 'EOF'
        #!/bin/bash
        SCRIPT_DIR=$(dirname "$(readlink -f "$0")")
        # Point to our embedded libraries
        export PATH="$SCRIPT_DIR/envs/myenv/bin:$PATH"
        export LD_LIBRARY_PATH="$SCRIPT_DIR/envs/myenv/lib:$SCRIPT_DIR/miniconda3/lib:$LD_LIBRARY_PATH"
        # Execute the app
        exec "$SCRIPT_DIR/envs/myenv/bin/python" "$SCRIPT_DIR/main.py" "$@"
        EOF
        chmod +x AppRun

    - name: Build AppImage
      run: |
        cd ${{ github.workspace }}
        
        # Package everything inside AppDir
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/*.desktop \
          --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-linux
        path: "*.AppImage"
