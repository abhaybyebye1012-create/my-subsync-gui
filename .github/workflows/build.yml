name: Final Standalone AppImage Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Tools
      run: |
        sudo apt-get update
        # Install dev tools required to compile Python extensions (like scikit-learn/numpy)
        sudo apt-get install -y patchelf wget curl unzip xdg-utils gcc g++ libffi-dev pkg-config build-essential

    - name: Download Core Linuxdeploy Tool
      run: |
        cd ${{ github.workspace }}
        wget -O linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

    - name: Install Embedded Runtime (Miniconda)
      run: |
        cd ${{ github.workspace }}
        mkdir -p AppDir
        
        # Download and install Miniconda silently into AppDir
        wget -qO miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
        bash miniconda.sh -b -u -p "${{ github.workspace }}/AppDir/miniconda3"
        rm miniconda.sh

    - name: Create Isolated Environment & Install Dependencies (FIXED PIP)
      run: |
        CONDA_INSTALL="${{ github.workspace }}/AppDir/miniconda3"
        ENV_PREFIX="${{ github.workspace }}/AppDir/envs/myenv"
        
        # Create a specific environment with Python 3.10
        mkdir -p "${{ github.workspace }}/AppDir/envs"
        $CONDA_INSTALL/bin/conda create -y -p "$ENV_PREFIX" python=3.10
        
        # FIX: Use 'python -m pip' instead of 'bin/pip'.
        ${ENV_PREFIX}/bin/python -m pip install --upgrade pip setuptools wheel
        
        # Install dependencies
        # Note: Added 'scikit-learn' which ffsubsync relies on for the alignment algorithm
        ${ENV_PREFIX}/bin/python -m pip install "numpy<2.0" torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        ${ENV_PREFIX}/bin/python -m pip install scikit-learn ffsubsync requests pysubs2 tqdm

    - name: Download & Bundle Static FFmpeg
      run: |
        APP_DIR="${{ github.workspace }}/AppDir"
        mkdir -p "$APP_DIR/usr/bin"
        mkdir -p ext
        
        # Download static FFmpeg archive
        wget -qO archive.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        
        # Extract safely
        tar xf archive.tar.xz -C ext --strip-components=1
        
        # Move binary to the correct place (handles folder structure variations)
        if [ -f ext/ffmpeg ]; then mv ext/ffmpeg "$APP_DIR/usr/bin/ffmpeg"; fi
        if [ ! -f "$APP_DIR/usr/bin/ffmpeg" ] && [ -f ext/bin/ffmpeg ]; then mv ext/bin/ffmpeg "$APP_DIR/usr/bin/ffmpeg"; fi
        
        # Remove temp files
        rm -rf ext archive.tar.xz
        chmod +x "$APP_DIR/usr/bin/ffmpeg"

    - name: Prepare Desktop Files
      run: |
        APP_DIR="${{ github.workspace }}/AppDir"
        mkdir -p "$APP_DIR/usr/share/applications" "$APP_DIR/usr/share/icons/hicolor/128x128/apps"
        
        printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=FFSubsync GUI\nExec=AppRun\nIcon=subsync\nTerminal=false\nCategories=AudioVideo;Utility;\n' > "$APP_DIR/usr/share/applications/SubSyncGui.desktop"
        wget -q -O "$APP_DIR/usr/share/icons/hicolor/128x128/apps/subsync.png" "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || true

    - name: Configure Launchers (AppRun)
      run: |
        APP_DIR="${{ github.workspace }}/AppDir"
        GITHUB_WORKSPACE="${{ github.workspace }}"
        
        # Copy main script
        cp "$GITHUB_WORKSPACE/main.py" "$APP_DIR/main.py"
        
        # Create the executable launcher
        cat > "$APP_DIR/AppRun" << 'EOF'
        #!/bin/bash
        SCRIPT_DIR=$(dirname "$(readlink -f "$0")")
        
        # CRITICAL PATH SETUP:
        # 1. Add our internal Python, FFmpeg, and Conda to PATH
        export PATH="$SCRIPT_DIR/envs/myenv/bin:$SCRIPT_DIR/usr/bin:$SCRIPT_DIR/miniconda3/bin:$PATH"
        
        # 2. Point to our embedded C-runtime (Fixes "old debian" library errors)
        export LD_LIBRARY_PATH="$SCRIPT_DIR/envs/myenv/lib:$SCRIPT_DIR/miniconda3/lib:$LD_LIBRARY_PATH"
        
        # Execute the app
        exec "$SCRIPT_DIR/envs/myenv/bin/python" "$SCRIPT_DIR/main.py" "$@"
        EOF
        chmod +x "$APP_DIR/AppRun"

    - name: Build AppImage (FIXED ARCHITECTURE ERROR)
      run: |
        cd ${{ github.workspace }}
        
        # EXPLICITLY SET ARCH=x86_64 to resolve the 'arch not found' error
        ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/*.desktop \
          --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-linux
        path: "*.AppImage"
