name: Build FFSubsync GUI AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Basic Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-tk patchelf wget curl unzip xdg-utils
        # Upgrade pip to ensure compatibility
        pip install --upgrade pip setuptools wheel

    - name: Install Python Requirements
      run: |
        pip install subsync
        pip install requests

    - name: Download Static FFmpeg
      run: |
        # We download a static build from John Van Sickle which includes all internal libraries
        cd /tmp
        wget -N https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        # Extract it to a temporary folder
        mkdir -p /tmp/ffmpeg_static && tar xf ffmpeg-release-amd64-static.tar.xz -C /tmp/ffmpeg_static --strip-components=1

    - name: Prepare Desktop File & Icons
      run: |
        mkdir -p ./files/usr/share/applications
        cat > ./files/usr/share/applications/com.example.ffsubsync.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=FFSubsync GUI
        Exec=AppRun
        Icon=subsync
        Terminal=false
        Categories=AudioVideo;Utility;
        EOF
        
        mkdir -p ./files/usr/share/icons/hicolor/128x128/apps
        # Download a placeholder icon
        wget -q -O ./files/usr/share/icons/hicolor/128x128/apps/subsync.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || echo "Icon skipped."

    - name: Build AppImage
      id: build
      run: |
        # CRITICAL STEP:
        # Copy the static FFmpeg binary into the AppImage's binary directory.
        # This ensures the AppImage has the engine needed to decode videos,
        # regardless of whether the user's old Debian system has FFmpeg installed.
        cp /tmp/ffmpeg_static/ffmpeg ./AppDir/usr/bin/ffmpeg
        chmod +x ./AppDir/usr/bin/ffmpeg

        # Run LinuxDeploy with the Python Plugin
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable main.py \
          --plugin python \
          --desktop-file ./files/usr/share/applications/*.desktop \
          --icon-file ./files/usr/share/icons/hicolor/128x128/apps/*.png \
          --output appimage

    - name: Upload Artifacts (v4)
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui
        path: *.AppImage
