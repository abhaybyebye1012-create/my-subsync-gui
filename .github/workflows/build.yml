name: Build Standalone AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        # Add FFmpeg PPA to get a usable version
        sudo add-apt-repository ppa:savoury1/ffmpeg6
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-tk ffmpeg libsvm-tools patchelf wget curl unzip xdg-utils
        pip install --upgrade pip setuptools wheel

    - name: Install Python Requirements
      run: |
        pip install subsync
        pip install requests

    - name: Download LinuxDeploy Tools
      run: |
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-python-x86_64.AppImage
        sudo wget -O /usr/local/bin/desktop-file-validate https://raw.githubusercontent.com/freedesktop.org/appstream-glib/master/tools/desktop-file-validate && sudo chmod +x /usr/local/bin/desktop-file-validate

    - name: Prepare Desktop File & Icons
      run: |
        mkdir -p ./files/usr/share/applications
        cat > ./files/usr/share/applications/com.example.subsync.desktop <<EOF
        [Desktop Entry]
        Type=Application
        Name=FFSubsync GUI
        Exec=AppRun
        Icon=subsync
        Terminal=false
        Categories=AudioVideo;Utility;
        EOF
        
        mkdir -p ./files/usr/share/icons/hicolor/128x128/apps
        # Using a placeholder icon URL; if this fails, the app will still build without an icon
        wget -q -O files/usr/share/icons/hicolor/128x128/apps/subsync.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || echo "Icon download skipped."

    - name: Build AppImage
      id: build
      run: |
        APPNAME="${{ github.event.repository.name }}"
        
        # CRITICAL FOR OLD DEBIAN: 
        # We copy the Ubuntu 22.04 ffmpeg binary INTO the AppImage structure.
        # This ensures the AppImage contains the decoding engine even if the target OS doesn't have ffmpeg.
        cp "$(which ffmpeg)" /AppDir/usr/bin/ffmpeg
        chmod +x /AppDir/usr/bin/ffmpeg

        # Run linuxdeploy
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable main.py \
          --plugin python \
          --desktop-file files/usr/share/applications/*.desktop \
          --icon-file files/usr/share/icons/hicolor/128x128/apps/*.png \
          --output appimage

    - name: Upload Artifact (Using v4)
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-appimage
        path: ${{ github.event.repository.name }}*.AppImage
