name: Build FFSubsync AppImage (Stable)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Base System Tools
      run: |
        sudo apt-get update
        # Only install dev tools, NO ffmpeg via apt yet. We bundle it manually.
        sudo apt-get install -y python3-dev python3-tk patchelf wget curl unzip xdg-utils
        pip install --upgrade pip setuptools wheel

    - name: Configure Python Environment for Stability
      run: |
        # Pin Numpy to < 2.0 to avoid compatibility issues with older audio libs
        pip install "numpy<2.0"
        
        # Force CPU-only PyTorch to avoid conflicts and reduce size
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

    - name: Install Main Application Dependencies
      run: |
        # Install ffsubsync now that base ML dependencies are locked
        pip install ffsubsync requests
        
        # Install Linuxdeploy tools
        chmod +x linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-plugin-python-x86_64.AppImage
        
        # Create folder for plugin so it loads automatically
        mkdir -p root
        mv linuxdeploy-plugin-python-x86_64.AppImage root/linuxdeploy-plugin-python-x86_64.AppImage

    - name: Download Static FFmpeg (Bundled)
      run: |
        # Download self-contained FFmpeg that works on ANY Debian version
        cd /tmp
        wget -N https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        mkdir -p ffmpeg_tmp && tar xf ffmpeg-release-amd64-static.tar.xz -C ffmpeg_tmp --strip-components=1
        mv ffmpeg_tmp/ffmpeg ./bundled_ffmpeg
        rm -rf ffmpeg_tmp ffmpeg-release-*
        chmod +x ./bundled_ffmpeg

    - name: Prepare Desktop & Icon
      run: |
        mkdir -p files/usr/share/applications files/usr/share/icons/hicolor/128x128/apps
        
        printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=FFSubsync GUI\nExec=AppRun\nIcon=subsync\nTerminal=false\nCategories=AudioVideo;Utility;\n' > files/desktop_file.desktop
        
        wget -q -O files/icon.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || true

    - name: Build AppImage
      run: |
        mkdir -p AppDir/usr/bin
        
        # CRITICAL: Inject our static FFmpeg into the AppImage
        cp ./bundled_ffmpeg AppDir/usr/bin/ffmpeg
        chmod +x AppDir/usr/bin/ffmpeg

        # Build the AppImage
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --executable main.py \
          --desktop-file files/desktop_file.desktop \
          --icon-file files/icon.png \
          --plugin python \
          --output appimage

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-linux
        path: "*.AppImage"
