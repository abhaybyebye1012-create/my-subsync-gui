name: Build Standalone AppImage (Full Proof)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev python3-tk patchelf wget curl unzip xdg-utils build-essential gcc g++

    - name: Download Linuxdeploy & Plugin
      run: |
        # 1. Core tool
        wget -O linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        # 2. Python Plugin (Official Continuous Build)
        wget -O linuxdeploy-plugin-python-x86_64.AppImage https://github.com/linuxdeploy/plugin-script-python/releases/download/continuous/linuxdeploy-plugin-python-x86_64.AppImage
        chmod +x linuxdeploy-plugin-python-x86_64.AppImage
        
        # 3. Place plugin in 'root' folder so linuxdeploy auto-detects '--plugin python'
        mkdir -p root
        mv linuxdeploy-plugin-python-x86_64.AppImage root/linuxdeploy-plugin-python-x86_64.AppImage

    - name: Install Python Libraries (Stable Config)
      run: |
        # Prevent TensorFlow/Numpy resolution conflicts
        pip install "numpy<2.0"
        
        # CPU-only PyTorch (Standardizes env, avoids GPU driver errors)
        pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        
        # Main application dependencies
        pip install ffsubsync requests

    - name: Download & Extract Static FFmpeg
      run: |
        wget -qO ffmpeg_archive.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        mkdir -p ext && tar xf ffmpeg_archive.tar.xz -C ext --strip-components=1
        rm -f ffmpeg_archive.tar.xz
        
        # Robust extraction & cleanup
        if [ -f ext/bin/ffmpeg ]; then
          cp ext/bin/ffmpeg .
        else
          cp ext/ffmpeg .
        fi
        chmod +x ffmpeg
        rm -rf ext

    - name: Prepare Desktop File & Icons
      run: |
        mkdir -p files/usr/share/applications files/usr/share/icons/hicolor/128x128/apps
        
        printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=FFSubsync GUI\nExec=AppRun\nIcon=subsync\nTerminal=false\nCategories=AudioVideo;Utility;\n' > files/desktop_file.desktop
        
        wget -q -O files/icon.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || true

    - name: Build AppImage
      run: |
        mkdir -p AppDir/usr/bin
        
        # 1. Inject static FFmpeg
        cp ./ffmpeg AppDir/usr/bin/ffmpeg
        
        # 2. Place main script in standard location for python plugin
        cp ./main.py AppDir/usr/bin/main.py
        chmod +x AppDir/usr/bin/main.py
        
        # 3. Run builder
        # NOTE: Removed '--executable main.py' to avoid ELF parsing crash.
        # The python plugin auto-discovers *.py in AppDir/usr/bin/ when invoked with '--plugin python'.
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --icon-file files/icon.png \
          --desktop-file files/desktop_file.desktop \
          --plugin python \
          --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-linux
        path: "*.AppImage"
