name: Build Standalone AppImage (Manual Conda Fix)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        # Essential build tools for compiling Python extensions
        sudo apt-get install -y python3-dev python3-tk patchelf wget curl unzip xdg-utils build-essential gcc g++

    - name: Download Core Linuxdeploy Tool
      run: |
        # Download only the core builder (No external plugins needed anymore)
        wget -O linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        # Prepare the AppImage directory structure
        mkdir -p AppDir/usr/bin

    - name: Download & Extract Static FFmpeg (FIXED EXTRACT ORDER)
      run: |
        cd $GITHUB_WORKSPACE
        # Download archive
        wget -qO archive.tar.xz https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
        
        # Create temp extraction folder
        mkdir -p ext
        tar xf archive.tar.xz -C ext --strip-components=1
        
        # CRITICAL FIX: Move the binary OUT of the temp folder BEFORE deleting the folder
        if [ -f ext/ffmpeg ]; then
          mv ext/ffmpeg AppDir/usr/bin/ffmpeg
        elif [ -f ext/bin/ffmpeg ]; then
          mv ext/bin/ffmpeg AppDir/usr/bin/ffmpeg
        else
          echo "ERROR: Could not locate ffmpeg binary!"
          ls -lR ext
          exit 1
        fi
        
        # NOW it is safe to delete the temp files
        rm -rf ext archive.tar.xz
        chmod +x AppDir/usr/bin/ffmpeg

    - name: Install Miniconda (Standalone Runtime)
      run: |
        cd $GITHUB_WORKSPACE
        # Download Miniconda installer
        wget -qO miniconda.sh https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
        # Install Miniconda directly inside the AppDir structure
        bash miniconda.sh -b -u -p ${PWD}/AppDir/miniconda3
        rm miniconda.sh
        
        # Initialize Conda environments for future use
        eval "$(${PWD}/AppDir/miniconda3/bin/conda shell.bash hook)"
        conda init bash > /dev/null 2>&1

    - name: Install Python Libraries (Isolated)
      run: |
        cd $GITHUB_WORKSPACE
        
        # Create a virtual environment specifically for this AppImage
        ~/AppDir/miniconda3/bin/conda create -y -n appenv python=3.10 --prefix "${PWD}/AppDir/envs/appenv"
        
        # Install packages into that isolated environment
        ~/AppDir/miniconda3/envs/appenv/bin/pip install "numpy<2.0"
        ~/AppDir/miniconda3/envs/appenv/bin/pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
        ~/AppDir/miniconda3/envs/appenv/bin/pip install ffsubsync requests pysubs2 tqdm
        
        # Copy the main script
        cp ./main.py AppDir/main.py

    - name: Configure Launchers
      run: |
        # Create a Custom AppRun script that manages the environment
        cat > AppDir/AppRun << 'EOF'
        #!/bin/bash
        # Determine the directory where the AppImage is running from
        SCRIPT_DIR=$(dirname "$(readlink -f "$0")")
        
        # Set paths to our internal Conda environment
        export PATH="$SCRIPT_DIR/envs/appenv/bin:$PATH"
        export LD_LIBRARY_PATH="$SCRIPT_DIR/envs/appenv/lib:$SCRIPT_DIR/miniconda3/lib:$LD_LIBRARY_PATH"
        
        # Execute the Main Script
        exec "$SCRIPT_DIR/envs/appenv/bin/python" "$SCRIPT_DIR/main.py" "$@"
        EOF
        chmod +x AppDir/AppRun

        # Configure Desktop File
        mkdir -p AppDir/usr/share/applications
        printf '[Desktop Entry]\nVersion=1.0\nType=Application\nName=FFSubsync GUI\nExec=AppRun\nIcon=subsync\nTerminal=false\nCategories=AudioVideo;Utility;\n' > AppDir/usr/share/applications/SubSyncGui.desktop
        
        # Add Icon
        mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
        wget -q -O AppDir/usr/share/icons/hicolor/128x128/apps/subsync.png "https://cdn-icons-png.flaticon.com/512/3075/3075908.png" || true

    - name: Build AppImage
      run: |
        # Use linuxdeploy to wrap our manually constructed directory into a self-contained AppImage
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/*.desktop \
          --output appimage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffsubsync-gui-linux
        path: "*.AppImage"
